    <style>
        .container {
            position: relative;
            width: 1440px;
            height: 1024px;

        .box {
            width: 1440px;
            height: 1024px;
            background-color: #DDA15E; 
            position: absolute;
            top: 0;
            left: 0;
        }
        .top-rectangle {
            width: 1440px;
            height: 163px;
            background-color: #BC6C25; 
            position: absolute;
            top: 0; 
            left: 0;
            display: flex; 
            justify-content: center;

            font-weight: bold; 
        }
        .circle {
            width: 295px;
            height: 295px;
            background-color: #fff; 
            border-radius: 50%; 
            position: absolute;
            top: 200px; 
            left: 50%; 
            transform: translateX(-50%); 
            overflow: hidden; 
            border: 2px solid #BC6C25; 
        }
        .circle img {
            width: 100%; 
            height: auto; 
        }
        .small-circle {
            width: 155px;
            height: 155px;
            background-color: #fff;
            border-radius: 50%; 
            position: absolute;
            top: 4px; 
            left: 10px; 
            overflow: hidden; 
            border: 2px solid #BC6C25; 
        }
        .small-circle img {
            width: 100%; 
            height: auto; 
        }
        .cube {
            width: 140px;
            height: 140px;
            background-color: #FEFAE0;

            top: 10px;
